<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Админ панель - вход</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<style>
			body {
				height: 100vh;
			}
		</style>
	</head>
	<body>
		<div
			class="container d-flex justify-content-center align-items-center h-100"
		>
			<div class="col-md-7 col-lg-4">
				<div class="card mt-5 shadow">
					<div class="card-body p-4">
						<h3 class="card-title text-center mb-4">Вход в админ панель</h3>
						<form action="" method="post">
							<div class="mb-3">
								<label for="email" class="label-form">email:</label>
								<input
									type="email"
									class="form-control"
									name="email"
									id="email"
									required
								/>
							</div>
							<div class="mb-3">
								<label for="password" class="label-form">пароль:</label>
								<input
									type="password"
									class="form-control"
									name="password"
									id="password"
									required
								/>
							</div>
							<div class="d-flex justify-content-center">
								<button
									type="submit"
									class="btn btn-primary"
									onclick="window.location.href = 'courses.html'"
								>
									Войти
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
