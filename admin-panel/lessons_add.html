												type="text"
												class="form-control"
												id="description"
												name="description"
											/>

										<div class="mb-3">
											<label for="hours" class="form-label fw-bold"
												>Длительность <span class="text-danger">*</span></label
											>
											<input
												type="number"
												class="form-control"
												id="hours"
												name="hours"
											/>
										</div>
										<div class="mb-3">
											<label for="video_link" class="form-label fw-bold"
